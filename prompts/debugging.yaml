    Evaluate whether the proposed fix is correct, minimal, and explained clearly.
  user: |
    Code: {{code}}
    Response: """{{response}}"""
    Score JSON only: {"raw_score": 0.0-1.0, "normalized": 0.0-1.0, "evaluation": "", "recommendations": ["", ""]}.
