name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.7.0)"
        required: true
        type: string
      base:
        description: "Base branch or tag to cut from"
        required: false
        default: "master"
        type: string
      notes_path:
        description: "Release notes file path"
        required: false
        default: "docs/reviews"
        type: string
      manifest_path:
        description: "Release manifest file directory"
        required: false
        default: "docs/reviews"
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify tests
        run: pytest aibenchmark/tests/ -q
      - name: Generate release artifacts
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          tag = os.environ.get("GITHUB_TAG", "")
          base = os.environ.get("GITHUB_BASE", "master")
          notes_dir = os.environ.get("GITHUB_NOTES_DIR", "docs/reviews")
          manifest_dir = os.environ.get("GITHUB_MANIFEST_DIR", "docs/reviews")
          if not tag:
              raise SystemExit("Missing tag")
          notes_path = Path(notes_dir) / f"{tag}-release-notes.md"
          manifest_path = Path(manifest_dir) / f"{tag}-release-manifest.md"
          notes = notes_path.read_text(encoding="utf-8") if notes_path.exists() else f"Release {tag}"
          manifest = manifest_path.read_text(encoding="utf-8") if manifest_path.exists() else ""
          Path("release").mkdir(exist_ok=True)
          Path("release/RELEASE_NOTES.md").write_text(notes, encoding="utf-8")
          Path("release/RELEASE_MANIFEST.md").write_text(manifest, encoding="utf-8")
          print(f"Generated release artifacts for {tag}")
          PY
        env:
          GITHUB_TAG: ${{ github.event.inputs.tag }}
          GITHUB_BASE: ${{ github.event.inputs.base }}
          GITHUB_NOTES_DIR: ${{ github.event.inputs.notes_path }}
          GITHUB_MANIFEST_DIR: ${{ github.event.inputs.manifest_path }}
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/
      - name: Create draft release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          body_path: release/RELEASE_NOTES.md
          draft: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
