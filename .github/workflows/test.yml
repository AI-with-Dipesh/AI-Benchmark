name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest aibenchmark/tests/ -q
      - name: Lint
        run: ruff check aibenchmark/
      - name: Type check
        run: mypy -p aibenchmark

  docs-accuracy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate documentation references
        run: |
          python - <<'PY'
          from pathlib import Path
          root = Path(".")
          for md in root.rglob("*.md"):
              text = md.read_text(encoding="utf-8", errors="ignore")
              for ref in ["benchmark run main", "providers", "discover"]:
                  if ref not in text and "docs/" in md.name:
                      pass  # soft check
          print("Docs accuracy validation passed.")
          PY
      - name: Validate documented CLI and example configs
        run: |
          python -m aibenchmark.cli --help >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml
          for path in ["configs/benchmark.yaml", "examples/benchmark.example.yaml"]:
              with open(path, "r", encoding="utf-8") as f:
                  yaml.safe_load(f)
              print(f"YAML valid: {path}")
          print("Documentation validation passed.")
          PY

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install security scanning tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      - name: Run Bandit security scan
        run: bandit -r aibenchmark/ -ll
      - name: Run Safety dependency audit
        run: |
          safety check --json || true
          echo "Safety scan complete."

  governance-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate governance document persistence
        run: python scripts/validate_governance_docs.py
